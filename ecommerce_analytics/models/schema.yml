version: 2

models:
  # STAGING MODELS
  - name: stg_customers
    description: Cleaned customer demographic data
    columns:
      - name: customer_id
        description: Unique customer identifier per order
        tests:
          - not_null
      - name: customer_unique_id
        description: Unique customer identifier across all orders
        tests:
          - not_null

  - name: stg_orders
    description: Cleaned order transactional data
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to customers
        tests:
          - not_null

  # INTERMEDIATE MODELS
  - name: int_orders_enriched
    description: Orders joined with customers, payments, items, and reviews
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null
      - name: payment_value
        description: Total payment amount
        tests:
          - not_null
      - name: delivery_status
        description: Whether order was delivered on time or late
      - name: delivery_days
        description: Days from purchase to delivery

  # MART MODELS
  - name: customer_cohorts
    description: Customer cohort analysis by first purchase month
    columns:
      - name: customer_unique_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null
      - name: cohort_month
        description: Month of first purchase (cohort assignment)
        tests:
          - not_null
      - name: total_orders
        description: Total number of orders placed by customer
        tests:
          - not_null
      - name: lifetime_value
        description: Total revenue generated by customer
        tests:
          - not_null

  - name: customer_lifetime_value
    description: Customer lifetime value with RFM segmentation
    columns:
      - name: customer_unique_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: Total spend by customer
        tests:
          - not_null
      - name: rfm_segment
        description: RFM customer segment (Champions, At Risk, Lost, etc.)
        tests:
          - not_null
          - accepted_values:
              values: ['Champions', 'Loyal Customers', 'New Customers', 'Promising', 'At Risk', 'Need Attention', 'Cant Lose Them', 'Lost', 'Others']
      - name: clv_segment
        description: CLV tier (VIP, High Value, etc.)
        tests:
          - not_null

  - name: funnel_analysis
    description: Order funnel conversion metrics
    columns:
      - name: funnel_stage
        description: Stage in order funnel
        tests:
          - not_null
      - name: orders
        description: Number of orders reaching this stage
        tests:
          - not_null
      - name: conversion_rate
        description: Percentage of total orders reaching this stage

  - name: retention_analysis
    description: Cohort retention rates over time
    columns:
      - name: cohort_month
        description: Customer acquisition cohort
        tests:
          - not_null
      - name: months_since_cohort
        description: Months since customer's first order
        tests:
          - not_null
      - name: retention_rate
        description: Percentage of cohort retained in this month
