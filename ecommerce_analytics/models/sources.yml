version: 2

sources:
  - name: ecommerce_raw
    description: Raw Olist e-commerce data from Brazilian marketplace (2016-2018)
    database: ecommerce_analysis
    schema: public
    tables:
      - name: olist_customers
        description: Customer demographic information
        columns:
          - name: customer_id
            description: Unique identifier for customer per order
            tests:
              - not_null
          - name: customer_unique_id
            description: Unique identifier for customer across all orders
            tests:
              - not_null
          - name: customer_city
            description: City where customer is located
          - name: customer_state
            description: State abbreviation (2 letters)

      - name: olist_orders
        description: Order transactional data with timestamps
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Foreign key to customers table
            tests:
              - not_null
              - relationships:
                  to: source('ecommerce_raw', 'olist_customers')
                  field: customer_id
          - name: order_status
            description: Order status (delivered, canceled, etc.)
            tests:
              - accepted_values:
                  values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']
          - name: order_purchase_timestamp
            description: Timestamp when order was placed
            tests:
              - not_null
          - name: order_approved_at
            description: Timestamp when payment was approved
          - name: order_delivered_carrier_date
            description: Timestamp when order handed to carrier
          - name: order_delivered_customer_date
            description: Timestamp when order delivered to customer
          - name: order_estimated_delivery_date
            description: Estimated delivery date shown to customer

      - name: olist_order_items
        description: Line items for each order
        columns:
          - name: order_id
            description: Foreign key to orders table
            tests:
              - not_null
              - relationships:
                  to: source('ecommerce_raw', 'olist_orders')
                  field: order_id
          - name: order_item_id
            description: Sequential number identifying item within order
          - name: product_id
            description: Foreign key to products table
          - name: seller_id
            description: Seller identifier
          - name: price
            description: Item price
            tests:
              - not_null
          - name: freight_value
            description: Shipping cost for this item
            tests:
              - not_null

      - name: olist_order_payments
        description: Payment information for orders
        columns:
          - name: order_id
            description: Foreign key to orders table
            tests:
              - not_null
              - relationships:
                  to: source('ecommerce_raw', 'olist_orders')
                  field: order_id
          - name: payment_sequential
            description: Sequential number for multiple payments
          - name: payment_type
            description: Payment method
          - name: payment_installments
            description: Number of installments
          - name: payment_value
            description: Payment amount
            tests:
              - not_null

      - name: olist_order_reviews
        description: Customer reviews and ratings
        columns:
          - name: review_id
            description: Review identifier (not unique - same review can appear multiple times)
          - name: order_id
            description: Foreign key to orders table
            tests:
              - not_null
              - relationships:
                  to: source('ecommerce_raw', 'olist_orders')
                  field: order_id
          - name: review_score
            description: Rating from 1-5
            tests:
              - not_null
              - accepted_values:
                  values: [1, 2, 3, 4, 5]
          - name: review_comment_title
            description: Review title written by customer
          - name: review_comment_message
            description: Review text written by customer

      - name: olist_products
        description: Product catalog information
        columns:
          - name: product_id
            description: Unique product identifier
            tests:
              - unique
              - not_null
          - name: product_category_name
            description: Product category in Portuguese
          - name: product_weight_g
            description: Product weight in grams
          - name: product_length_cm
            description: Product length in centimeters
          - name: product_height_cm
            description: Product height in centimeters
          - name: product_width_cm
            description: Product width in centimeters
